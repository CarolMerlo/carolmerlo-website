name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ------------------------------------------------------------------
  # Job 1: HTML validation + CSS and JS linting
  # ------------------------------------------------------------------
  lint:
    name: Validate HTML / CSS / JS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JS
        run: npm run lint:js

  # ------------------------------------------------------------------
  # Job 2: Lighthouse CI (performance, accessibility, SEO)
  # ------------------------------------------------------------------
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Serve site and run Lighthouse
        run: |
          npx http-server . -p 8080 --silent &
          sleep 3
          npm run lighthouse
